services:
  # 1. Your Custom Python Bot Service
  - type: web
    name: ekkshunya-msg-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BRAVE_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # 2. The Core Background WhatsApp Engine (Now 100% Free Tier!)
  - type: web
    name: waha-whatsapp-engine
    env: docker
    dockerfilePath: Dockerfile
