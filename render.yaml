services:
  # 1. Your Custom Python Bot Service
  - type: web
    name: ekkshunya-msg-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BRAVE_API_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

  # 2. The Core Background WhatsApp Engine
  - type: web
    name: waha-whatsapp-engine
    env: image
    # 🌟 FIXED: Formatted into a proper object block structure to clear the unmarshal schema error
    image:
      url: devlikeapro/waha:latest
